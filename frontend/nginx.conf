# ==============================================================================
# NGINX.CONF - WEB SERVER CONFIGURATION
# ==============================================================================
#
# WHAT IS NGINX?
# Nginx (pronounced "engine-x") is a high-performance web server.
# It can:
# - Serve static files (HTML, CSS, JS)
# - Reverse proxy (forward requests to other servers)
# - Load balance (distribute traffic across servers)
# - Handle SSL/TLS (HTTPS)
#
# WHY USE NGINX FOR REACT?
# React builds to static files. Nginx is extremely fast at serving these.
# It also handles:
# - SPA routing (send all routes to index.html)
# - API proxying (frontend calls /api, Nginx forwards to backend)
# - Caching and compression (faster page loads)
# - Security headers
#
# PRODUCTION DEPLOYMENT:
# In production, you'd typically have:
# - Nginx as the public-facing server (port 80/443)
# - Backend servers behind Nginx (not exposed to internet)
# - Nginx handles SSL, caching, and routing
#
# ==============================================================================

# SERVER BLOCK
# Defines a virtual server (one per site/domain)
# You can have multiple server blocks for different domains
server {
    # PORT
    # Listen on port 80 (HTTP default)
    # For HTTPS, you'd add: listen 443 ssl;
    listen 80;
    
    # SERVER NAME
    # Domain name(s) this server responds to
    # localhost for development; yoursite.com for production
    server_name localhost;
    
    # DOCUMENT ROOT
    # Where the static files are located
    # This is where our built React app lives
    root /usr/share/nginx/html;
    
    # DEFAULT FILE
    # Which file to serve when requesting a directory
    index index.html;

    # ==========================================================================
    # GZIP COMPRESSION
    # ==========================================================================
    # Compresses responses before sending to client.
    # Smaller files = faster loading (especially on slow connections)
    #
    # Modern browsers support gzip. The browser sends:
    #   Accept-Encoding: gzip, deflate
    # And Nginx responds with compressed content.
    
    gzip on;                    # Enable gzip
    gzip_vary on;               # Add Vary header (for caching)
    gzip_min_length 1024;       # Don't compress tiny files
    gzip_proxied expired no-cache no-store private auth;  # When to compress proxied requests
    
    # File types to compress (text-based files compress well)
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml application/javascript;

    # ==========================================================================
    # SECURITY HEADERS
    # ==========================================================================
    # HTTP headers that improve security. These are production best practices.
    
    # X-Frame-Options: Prevents your site from being embedded in iframes
    # Protects against: Clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # X-Content-Type-Options: Prevents browsers from MIME-sniffing
    # Protects against: MIME confusion attacks
    add_header X-Content-Type-Options "nosniff" always;
    
    # X-XSS-Protection: Enables browser's XSS filter
    # Protects against: Some cross-site scripting attacks
    # (Note: Modern browsers have better protections, but this doesn't hurt)
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer-Policy: Controls what info is sent in Referer header
    # Protects: User privacy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==========================================================================
    # API PROXY (Reverse Proxy)
    # ==========================================================================
    # Forward /api requests to the backend server.
    #
    # WHY PROXY?
    # - Frontend and backend on same domain (no CORS issues)
    # - Backend isn't exposed to internet directly
    # - One entry point for all traffic
    #
    # Without proxy: Frontend calls http://backend:5000/api (cross-origin)
    # With proxy: Frontend calls /api → Nginx forwards to backend:5000/api
    
    location /api {
        # Forward to backend service (Docker DNS resolves "backend" name)
        # In docker-compose, services can reach each other by name
        proxy_pass http://backend:5000;
        
        # Use HTTP/1.1 (required for keep-alive and WebSocket upgrades)
        proxy_http_version 1.1;
        
        # WebSocket support (for HTTP upgrade requests)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Forward original client information to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Don't cache upgraded connections
        proxy_cache_bypass $http_upgrade;
    }

    # ==========================================================================
    # WEBSOCKET PROXY (Socket.io)
    # ==========================================================================
    # Socket.io uses /socket.io path for WebSocket connections.
    # WebSockets require special handling (HTTP upgrade).
    
    location /socket.io {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        
        # CRITICAL FOR WEBSOCKETS
        # These headers tell Nginx to "upgrade" HTTP to WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket connections stay open for a long time
        # Default timeout is 60s; we extend to 24 hours
        proxy_read_timeout 86400;
    }

    # ==========================================================================
    # STATIC ASSET CACHING
    # ==========================================================================
    # Aggressive caching for static assets (JS, CSS, images).
    #
    # WHY CACHE?
    # - Faster subsequent page loads
    # - Less bandwidth usage
    # - Less server load
    #
    # ~* means case-insensitive regex match
    # This matches: app.js, style.css, logo.png, etc.
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # Cache for 1 year
        # This is safe because Vite adds content hashes to filenames
        # (style.a1b2c3.css) - if content changes, filename changes
        expires 1y;
        
        # public: CDNs can cache this
        # immutable: Content will never change (don't revalidate)
        add_header Cache-Control "public, immutable";
        
        # Serve file if exists, otherwise 404
        try_files $uri =404;
    }

    # ==========================================================================
    # SPA FALLBACK (Single Page Application Routing)
    # ==========================================================================
    # THE MOST IMPORTANT PART FOR REACT APPS
    #
    # THE PROBLEM:
    # React Router handles routes in JavaScript:
    #   /dashboard → Dashboard component
    #   /profile/john → Profile component
    #
    # But if user directly visits /dashboard (or refreshes):
    #   Browser requests: /dashboard
    #   Nginx looks for: /dashboard file or folder
    #   Result: 404 Not Found!
    #
    # THE SOLUTION:
    # Always serve index.html for routes, let React handle routing.
    #
    # try_files directive tries options in order:
    # 1. $uri - Try to serve the exact file requested
    # 2. $uri/ - Try to serve as directory (look for index.html inside)
    # 3. /index.html - Fallback: serve index.html (React takes over)
    
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================================================
    # HEALTH CHECK ENDPOINT
    # ==========================================================================
    # Simple endpoint for load balancers/monitoring to check if Nginx is running.
    
    location /health {
        access_log off;  # Don't log health checks (too noisy)
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
