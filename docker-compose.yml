services:
  mongodb:
    image: mongo:7.0
    container_name: sciencebowlone-mongodb
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE:-sciencebowl}
    networks:
      - sciencebowlone-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sciencebowlone-app
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-5000}
      - TRUST_PROXY=${TRUST_PROXY:-true}
      - SERVE_STATIC_FRONTEND=${SERVE_STATIC_FRONTEND:-true}
      - FRONTEND_DIST_PATH=${FRONTEND_DIST_PATH:-../frontend/dist}
      - CORS_ENABLED=${CORS_ENABLED:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - ALLOW_VERCEL_PREVIEW_ORIGINS=${ALLOW_VERCEL_PREVIEW_ORIGINS:-false}
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/sciencebowl}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - REQUEST_SIZE_LIMIT=${REQUEST_SIZE_LIMIT:-10kb}
      - APP_NAME=${APP_NAME:-ScienceBowlOne}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-http://localhost:3000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - PROTEST_AI_PROVIDER=${PROTEST_AI_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-1.5-flash}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - sciencebowlone-network

networks:
  sciencebowlone-network:
    driver: bridge

volumes:
  mongodb_data:
